services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: retention-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.services.model_training
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "false"
    plan: free

  # ── Frontend (React + Vite) ────────────────────────────────────────────────
  - type: web
    name: retention-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://retention-ai-backend.onrender.com
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
