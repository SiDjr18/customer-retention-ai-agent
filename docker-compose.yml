version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retention_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro          # dataset (read-only inside container)
      - ./reports:/app/reports       # generated reports persist on host
      - ./backend/artifacts:/app/artifacts  # model artefacts persist on host
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - REPORTS_DIR=/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: retention_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://backend:8000
    restart: unless-stopped

networks:
  default:
    name: retention_network
